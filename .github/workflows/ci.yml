name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push badge JSON to python-coverage-comment-action-data branch
      pull-requests: write  # post coverage comment on PRs
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff check)
        run: ruff check .

      - name: Format check (ruff format)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy src/

      - name: Unit tests
        run: pytest tests/unit/ -v --no-cov

      - name: BDD tests
        # Exit code 5 = no tests collected (BDD steps added incrementally); treat as pass.
        # Use `set +e` before pytest so bash's errexit (-e) doesn't fire before
        # we can capture $? and branch on it.
        run: |
          set +e
          pytest tests/bdd/ -v --no-cov
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then exit 0; fi
          exit "$code"

      - name: Full test suite with coverage
        # Runs all tests and enforces fail_under=90 via [tool.coverage.report] in pyproject.toml.
        # Produces coverage.xml used by the badge step below.
        run: pytest tests/

      - name: Coverage comment
        # Only post/update badge on one Python version to avoid race conditions.
        if: matrix.python-version == '3.12'
        uses: py-cov-action/python-coverage-comment-action@v3
        with:
          GITHUB_TOKEN: ${{ github.token }}

      - name: BDD report — run BDD suite with JUnit output
        # Produces .bdd-results.xml consumed by the badge and traceability steps.
        # Only runs on Python 3.12 on main to avoid redundant badge commits.
        if: matrix.python-version == '3.12'
        run: |
          set +e
          pytest tests/bdd/ --junitxml=.bdd-results.xml --no-cov -q
          code=$?
          set -e
          if [ "$code" -eq 5 ]; then exit 0; fi
          exit "$code"

      - name: BDD report — generate badge JSON and traceability report
        if: matrix.python-version == '3.12'
        run: |
          python scripts/bdd_report.py \
            --junit .bdd-results.xml \
            --features specs/001-gherkin-bdd-specs/features \
            --badge-output bdd-badge.json \
            --report-output bdd-traceability.md || true
          # '|| true' so that failing scenarios don't block the artifact upload step;
          # the non-zero exit is surfaced in the BDD tests step above.

      - name: BDD report — commit badge JSON to data branch
        if: >-
          matrix.python-version == '3.12' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        run: |
          # Clone the data branch into a standalone directory (no shared object store).
          DATA_DIR=$(mktemp -d)
          if git ls-remote --exit-code origin python-coverage-comment-action-data; then
            git clone --depth=1 --branch python-coverage-comment-action-data \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
              "$DATA_DIR"
          else
            git clone --depth=1 \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" \
              "$DATA_DIR"
            cd "$DATA_DIR"
            git checkout --orphan python-coverage-comment-action-data
            git rm -rf . --quiet
            cd -
          fi
          cp bdd-badge.json "$DATA_DIR/bdd-badge.json"
          cd "$DATA_DIR"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add bdd-badge.json
          git diff --cached --quiet || git commit -m "chore: update bdd-badge.json [skip ci]"
          git push origin HEAD:python-coverage-comment-action-data

      - name: BDD report — upload traceability report as artifact
        if: >-
          matrix.python-version == '3.12' &&
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: bdd-traceability-report
          path: bdd-traceability.md
          if-no-files-found: warn
